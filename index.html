// ============================================================
//  ФИНМОДЕЛЬ ЛАГЕРЯ 2026 — полная посменная модель (прототип)
//  6 смен со своими параметрами · ЗП-сетка роли×смены ·

//  факт из CRM (демо + кнопка Обновить).

const SHIFTS = [1, 2, 3, 4, 5, 6];
const KIDS_PER_SQUAD = 10; // 10 детей = 1 отряд = 1 вожатый

// --- наполняемость по сменам (1 и 6 по 40, остальные по 60) ---
const DEFAULT_CAPACITY = { 1: 40, 2: 60, 3: 60, 4: 60, 5: 60, 6: 50 };
const DEFAULT_DAYS = { 1: 10, 2: 10, 3: 9, 4: 10, 5: 10, 6: 10 };

// --- цены и доли (3 категории внутри смены) ---
const DEFAULT_PRICES = { early: 850, normal: 900, full: 1000 };
const DEFAULT_SHARES = { early: 0.5, normal: 0.3, full: 0.2 };

// --- роли ЗП (ставка за день для type=day, фикс/смена для type=fixed) ---
// couns (вожатые) — особая роль: кол-во авто = отряды, но переопределяемо
// type: "day" — ставка/день×дни×qty | "fixed" — фикс/смена×qty
//       "dayToggle" — ставка/день×дни, считается только на отмеченных сменах (active)
// 6 вожатых = по числу отрядов на смене 60 детей; на сменах 40 детей активны первые 4
const allOn = { 1: true, 2: true, 3: true, 4: true, 5: true, 6: true };
const big = { 1: false, 2: true, 3: true, 4: true, 5: true, 6: false }; // только смены по 60
const DEFAULT_ROLES = [
  { id: "admin", name: "Администратор", type: "day", qty: 1, group: "team", rate: fill(100) },
  { id: "c1", name: "Вожатый 1", type: "dayToggle", group: "couns", rate: fill(80), active: { ...allOn } },
  { id: "c2", name: "Вожатый 2", type: "dayToggle", group: "couns", rate: fill(80), active: { ...allOn } },
  { id: "c3", name: "Вожатый 3", type: "dayToggle", group: "couns", rate: fill(80), active: { ...allOn } },
  { id: "c4", name: "Вожатый 4", type: "dayToggle", group: "couns", rate: fill(80), active: { ...allOn } },
  { id: "c5", name: "Вожатый 5", type: "dayToggle", group: "couns", rate: fill(40), active: { ...big } },
  { id: "c6", name: "Вожатый 6", type: "dayToggle", group: "couns", rate: fill(40), active: { ...big } },
  { id: "ped1",  name: "Педагог 1",     type: "day", qty: 1, group: "team", rate: fill(90), pedagog: true },
  { id: "ped2",  name: "Педагог 2",     type: "day", qty: 1, group: "team", rate: fill(90), pedagog: true },
  { id: "ped3",  name: "Педагог 3",     type: "day", qty: 1, group: "team", rate: fill(90), pedagog: true },
  { id: "ped4",  name: "Педагог 4",     type: "day", qty: 1, group: "team", rate: fill(90), pedagog: true },
  { id: "ped5",  name: "Педагог 5",     type: "day", qty: 1, group: "team", rate: fill(90), pedagog: true },
  { id: "video", name: "Видеооператор", type: "fixed", qty: 1, group: "budget", rate: fill(900) },
  { id: "buh",   name: "Бухгалтер",     type: "fixed", qty: 1, group: "budget", rate: fill(1000) },
  { id: "smm",   name: "СММ",           type: "fixed", qty: 1, group: "budget", rate: fill(750) },
  { id: "mkt",   name: "Маркетолог",    type: "fixed", qty: 1, group: "budget", rate: fill(900) },
  { id: "rop",   name: "РОП",           type: "fixed", qty: 1, group: "budget", rate: fill(1500) },
  { id: "mng",   name: "Менеджеры",     type: "fixed", qty: 2, group: "budget", rate: fill(950) },
  { id: "clean", name: "Клининг",       type: "day", qty: 1, group: "budget", rate: fill(55) },
];
function fill(v) { return { 1: v, 2: v, 3: v, 4: v, 5: v, 6: v }; }

// --- прочие параметры (общие) ---
const DEFAULT_PARAMS = {
  cateringPerDayPerChild: 15, // руб/день × (дети+вожатые+админ) × дни смены
  householdPct: 0.05,         // бытовые, % от выручки (подтверждено)
  clubInvestPct: 0.02,        // вложения в клуб, % от выручки
  internetAdsPerShift: 700,   // реклама, фикс/смена
  // постоянные расходы (фикс/смена) — зафиксированы по факту
  rent: 3100, utilities: 700, credit: 1500, internet: 200,
  mobile: 125, services: 700, mandatoryStaff: 1500,
  usnPct: 0.04,               // УСН РБ 2026 — льготная ставка для вашей системы (сверьте с бухгалтером)
  amortization: 0,
  fillPrice: 980,             // цена добора ещё не собранных мест (прогноз)
  pricePerDayNoAbon: 100,     // цена/день для ребёнка без абонемента в CRM
};

// --- демо-факт из CRM ---
// стартовый факт — нули до автозагрузки из CRM при открытии
const EMPTY_FACT = {
  1: { children: 0, cash: 0, erip: 0 }, 2: { children: 0, cash: 0, erip: 0 },
  3: { children: 0, cash: 0, erip: 0 }, 4: { children: 0, cash: 0, erip: 0 },
  5: { children: 0, cash: 0, erip: 0 }, 6: { children: 0, cash: 0, erip: 0 },
};

const BYN = (n) => (Math.round(n) || 0).toLocaleString("ru-RU") + " р";

const SHIFT_DATE_LABEL = {  1: "1–12 июня", 2: "13–26 июня", 3: "27 июня – 10 июля",
  4: "11–24 июля", 5: "25 июля – 7 авг", 6: "8–21 авг",
};

// машинные даты смен — для расчёта оставшихся дней (от сегодня до e_date)
const SHIFT_RANGES = {
  1: { from: new Date(2026, 5, 1),  to: new Date(2026, 5, 12) },
  2: { from: new Date(2026, 5, 13), to: new Date(2026, 5, 26) },
  3: { from: new Date(2026, 5, 27), to: new Date(2026, 6, 10) },
  4: { from: new Date(2026, 6, 11), to: new Date(2026, 6, 24) },
  5: { from: new Date(2026, 6, 25), to: new Date(2026, 7, 7)  },
  6: { from: new Date(2026, 7, 8),  to: new Date(2026, 7, 21) },
};

// сколько РАБОЧИХ дней смены осталось, считая от сегодня:
//   - смена ещё не началась → все рабочие дни (10 или 9)
//   - идёт → пропорционально (rabочие × доля_оставшегося_календарного_времени)
//   - закончилась → 0
function remainingDaysOfShift(shift, fullDays) {
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const r = SHIFT_RANGES[shift]; if (!r) return fullDays;
  if (today <= r.from) return fullDays;
  if (today > r.to) return 0;
  const totalCal = (r.to - r.from) / 86400000 + 1;        // календарных дней в смене
  const remainCal = (r.to - today) / 86400000 + 1;        // календарных осталось (вкл. сегодня)
  return Math.max(0, Math.round(fullDays * (remainCal / totalCal)));
}

// карта: id статьи расхода в CRM → название и плановое значение для ОДНОЙ смены
// p — расчёт смены (perShift), m — помесячные параметры (params)
// factItems — если факт собирается из нескольких статей CRM; plan: ()=>null — факт без плана
const EXPENSE_MAP = [
  { itemId: 1,  name: "Аренда",            plan: (p, m) => m.rent },
  { itemId: 2,  name: "Коммунальные",      plan: (p, m) => m.utilities },
  { itemId: 3,  name: "Бытовые",           plan: (p, m) => p.household },
  { itemId: 19, name: "Кейтеринг",         plan: (p, m) => p.catering },
  { itemId: 9,  name: "Интернет",          plan: (p, m) => m.internet },
  { itemId: 8,  name: "Связь",             plan: (p, m) => m.mobile },
  { itemId: 11, name: "Реклама",           plan: (p, m) => p.ads },
  { itemId: 12, name: "Сервисы",           plan: (p, m) => m.services },
  { itemId: 13, name: "Бюджетные ЗП",      plan: (p, m) => p.payrollOther },
  { itemId: 18, name: "ЗП за МК",          plan: (p, m) => p.payrollPed },
  { itemId: 14, name: "Кредит",            plan: (p, m) => m.credit },
  { itemId: 15, name: "Налог",             plan: (p, m) => p.tax },
  { itemId: 17, name: "ФСЗН и белгосстрах", plan: (p, m) => m.mandatoryStaff },
  { itemId: 10, name: "Вложения в клуб",   plan: (p, m) => p.clubInvest },
  { itemId: 16, name: "Комиссия Банка",    plan: () => null },
  { itemId: 20, name: "Без статьи",        plan: () => null },
];
const PCT = (n) => (n * 100).toFixed(1) + "%";
const squads = (kids) => Math.ceil(kids / KIDS_PER_SQUAD);

// сумма ВСЕХ фактических расходов смены из CRM (по всем статьям, включая налог,
// комиссию банка и «без статьи»). expShiftData = expensesByShift[смена] либо null.
function factExpensesTotal(expShiftData) {
  if (!expShiftData) return null;
  return Object.values(expShiftData).reduce((s, v) => s + (Number(v) || 0), 0);
}

// число людей в роли для смены
function roleQty(role) {
  return role.qty || 0;
}
function roleCost(role, shift, days) {
  const rate = role.rate[shift] || 0;
  if (role.type === "dayToggle")
    return role.active[shift] ? rate * days[shift] : 0;
  if (role.type === "day") return rate * days[shift] * (role.qty || 0);
  return rate * (role.qty || 0); // fixed
}

// P&L одной смены при ТЕКУЩЕМ наборе (из CRM):
// число детей = фактически вписанные, выручка = по реальным абонементам + потенциал бесабонементных
function calcShiftActual(shift, st, factShift) {
  const enrolled = (factShift && factShift.children) || 0;
  const noAbon = (factShift && factShift.noAbonChildren) || 0;
  const days = st.days[shift];
  const revAbon = (factShift && factShift.revenueEnrolled) || 0;
  // для детей без абонемента — только оставшиеся дни смены (от сегодня до e_date)
  const remainDays = remainingDaysOfShift(shift, days);
  const revNoAbon = noAbon * (st.params.pricePerDayNoAbon || 0) * remainDays;
  const revenue = revAbon + revNoAbon;

  // ФОТ и постоянные расходы — те же, как и в плане (не зависят от числа детей)
  const payroll = st.roles.reduce(
    (sum, r) => sum + roleCost(r, shift, st.days), 0);
  const isPedagog = (r) => r.pedagog === true;
  const payrollPed = st.roles.filter(isPedagog)
    .reduce((sum, r) => sum + roleCost(r, shift, st.days), 0);
  const payrollOther = payroll - payrollPed;

  // кейтеринг — от ФАКТИЧЕСКИХ детей + вожатые + админ
  const counsCount = st.roles.filter(
    (r) => r.group === "couns" && r.active && r.active[shift]).length;
  const adminCount = st.roles
    .filter((r) => r.id === "admin")
    .reduce((sum, r) => sum + (r.qty || 0), 0);
  const eaters = enrolled + counsCount + adminCount;
  const catering = st.params.cateringPerDayPerChild * eaters * days;

  const household = revenue * st.params.householdPct;
  const clubInvest = revenue * (st.params.clubInvestPct || 0);
  const ads = st.params.internetAdsPerShift;
  const directCosts = payroll + catering + household + clubInvest + ads;

  const grossProfit = revenue - directCosts;
  const fixedCosts = st.params.rent + st.params.utilities + st.params.credit +
    st.params.internet + st.params.mobile + st.params.services + st.params.mandatoryStaff;
  const ebitda = grossProfit - fixedCosts;
  const tax = revenue * st.params.usnPct;
  const netProfit = ebitda - tax - st.params.amortization;

  return { enrolled, noAbon, revAbon, revNoAbon, revenue, remainDays, payroll, payrollPed, payrollOther,
    catering, household, clubInvest, ads, directCosts, eaters,
    grossProfit, fixedCosts, ebitda, tax, netProfit };
}

// P&L одной смены
function calcShift(shift, st) {
  const cap = st.capacity[shift];
  const days = st.days[shift];
  const seatsE = cap * st.shares.early;
  const seatsN = cap * st.shares.normal;
  const seatsF = cap * st.shares.full;
  const revenue = seatsE * st.prices.early + seatsN * st.prices.normal + seatsF * st.prices.full;

  const payroll = st.roles.reduce(
    (sum, r) => sum + roleCost(r, shift, st.days), 0);
  // раздельный ФОТ: педагоги (ЗП за МК) и все остальные (Бюджетные ЗП)
  const isPedagog = (r) => r.pedagog === true;
  const payrollPed = st.roles.filter(isPedagog)
    .reduce((sum, r) => sum + roleCost(r, shift, st.days), 0);
  const payrollOther = payroll - payrollPed;

  // едоки на кейтеринге: дети + вожатые (активные на смене) + администратор
  const counsCount = st.roles.filter(
    (r) => r.group === "couns" && r.active && r.active[shift]).length;
  const adminCount = st.roles
    .filter((r) => r.id === "admin")
    .reduce((sum, r) => sum + (r.qty || 0), 0);
  const eaters = cap + counsCount + adminCount;
  const catering = st.params.cateringPerDayPerChild * eaters * days;

  const household = revenue * st.params.householdPct;
  const clubInvest = revenue * (st.params.clubInvestPct || 0);
  const ads = st.params.internetAdsPerShift;
  const directCosts = payroll + catering + household + clubInvest + ads;

  const grossProfit = revenue - directCosts;
  const fixedCosts = st.params.rent + st.params.utilities + st.params.credit +
    st.params.internet + st.params.mobile + st.params.services + st.params.mandatoryStaff;
  const ebitda = grossProfit - fixedCosts;
  const tax = revenue * st.params.usnPct;
  const netProfit = ebitda - tax - st.params.amortization;

  return { cap, revenue, payroll, payrollPed, payrollOther, catering, household, clubInvest, ads, directCosts, eaters,
    grossProfit, fixedCosts, ebitda, tax, netProfit,
    grossMargin: revenue ? grossProfit / revenue : 0,
    netMargin: revenue ? netProfit / revenue : 0 };
}

function CampModel() {
  const [tab, setTab] = useState("plan");
  const [capacity, setCapacity] = useState(DEFAULT_CAPACITY);
  const [days] = useState(DEFAULT_DAYS);
  const [prices, setPrices] = useState(DEFAULT_PRICES);
  const [shares, setShares] = useState(DEFAULT_SHARES);
  const [roles, setRoles] = useState(DEFAULT_ROLES);
  const [params, setParams] = useState(DEFAULT_PARAMS);
  const [fact, setFact] = useState(EMPTY_FACT);
  const [expensesByShift, setExpensesByShift] = useState(null); // факт расходов из CRM по сменам/статьям
  const [lastSync, setLastSync] = useState(null);
  const [lastSyncAbon, setLastSyncAbon] = useState(null);
  const [syncing, setSyncing] = useState(false);
  const [syncingAbon, setSyncingAbon] = useState(false);
  const [editCell, setEditCell] = useState(null);
  const [restored, setRestored] = useState(false);
  const readyToSave = useRef(false); // защёлка: true только после восстановления черновика
  const [expShift, setExpShift] = useState(1); // выбранная смена для блока расходов
  const [hideProfit, setHideProfit] = useState(false); // скрыть сумму чистой прибыли

  // --- автозагрузка черновика из браузера при старте (со склейкой с дефолтами) ---
  useEffect(() => {
    try {
      const raw = localStorage.getItem("finmodel_draft");
      if (raw) {
        const d = JSON.parse(raw);
        // склейка: дефолт снизу, сохранённое сверху — новые поля не теряются
        if (d.capacity) setCapacity({ ...DEFAULT_CAPACITY, ...d.capacity });
        if (d.prices) setPrices({ ...DEFAULT_PRICES, ...d.prices });
        if (d.shares) setShares({ ...DEFAULT_SHARES, ...d.shares });
        if (Array.isArray(d.roles) && d.roles.length) {
          // переносим флаг pedagog с дефолтных ролей (старый черновик мог его не содержать)
          const merged = d.roles.map((r) => {
            const def = DEFAULT_ROLES.find((x) => x.id === r.id);
            return def && def.pedagog && r.pedagog === undefined ? { ...r, pedagog: true } : r;
          });
          setRoles(merged);
        }
        if (d.params) setParams({ ...DEFAULT_PARAMS, ...d.params });
        setRestored(true);
      }
    } catch (e) { /* битый черновик — игнорируем, останутся значения по умолчанию */ }
    // защёлка: разрешаем автосохранение ТОЛЬКО после того, как восстановление
    // черновика отработало. Иначе второй useEffect успевает затереть черновик
    // дефолтами раньше, чем применится setRoles (гонка эффектов при старте).
    readyToSave.current = true;
  }, []);

  // --- автосохранение черновика при любом изменении ---
  useEffect(() => {
    if (!readyToSave.current) return; // не сохраняем, пока не восстановили черновик
    try {
      localStorage.setItem("finmodel_draft",
        JSON.stringify({ capacity, prices, shares, roles, params, savedAt: Date.now() }));
    } catch (e) { /* приватный режим / переполнение — тихо пропускаем */ }
  }, [capacity, prices, shares, roles, params]);

  const stAll = { capacity, days, prices, shares, roles, params };

  const perShift = useMemo(
    () => SHIFTS.map((s) => ({ shift: s, ...calcShift(s, stAll) })),
    [capacity, prices, shares, roles, params]);

  const perShiftActual = useMemo(
    () => SHIFTS.map((s) => ({ shift: s, ...calcShiftActual(s, stAll, fact[s]) })),
    [fact, roles, params]);

  const seasonActual = useMemo(() => perShiftActual.reduce((a, s) => ({
    revenue: a.revenue + s.revenue, payroll: a.payroll + s.payroll,
    catering: a.catering + s.catering, household: a.household + s.household,
    clubInvest: a.clubInvest + s.clubInvest, ads: a.ads + s.ads,
    directCosts: a.directCosts + s.directCosts, grossProfit: a.grossProfit + s.grossProfit,
    fixedCosts: a.fixedCosts + s.fixedCosts, ebitda: a.ebitda + s.ebitda,
    tax: a.tax + s.tax, netProfit: a.netProfit + s.netProfit,
  }), { revenue: 0, payroll: 0, catering: 0, household: 0, clubInvest: 0, ads: 0,
       directCosts: 0, grossProfit: 0, fixedCosts: 0, ebitda: 0, tax: 0, netProfit: 0 }),
  [perShiftActual]);

  const season = useMemo(() => perShift.reduce((a, s) => ({
    revenue: a.revenue + s.revenue, directCosts: a.directCosts + s.directCosts,
    payroll: a.payroll + s.payroll, catering: a.catering + s.catering, household: a.household + s.household,
    clubInvest: a.clubInvest + s.clubInvest, ads: a.ads + s.ads,
    grossProfit: a.grossProfit + s.grossProfit, fixedCosts: a.fixedCosts + s.fixedCosts,
    ebitda: a.ebitda + s.ebitda, tax: a.tax + s.tax, netProfit: a.netProfit + s.netProfit,
  }), { revenue: 0, directCosts: 0, payroll: 0, catering: 0, household: 0, clubInvest: 0, ads: 0, grossProfit: 0, fixedCosts: 0, ebitda: 0, tax: 0, netProfit: 0 }),
  [perShift]);

  const setP = (k, v) => setParams((s) => ({ ...s, [k]: v }));
  const setPr = (k, v) => setPrices((s) => ({ ...s, [k]: v }));
  const setSh = (k, v) => setShares((s) => ({ ...s, [k]: v }));
  const setCap = (s, v) => setCapacity((c) => ({ ...c, [s]: v }));
  const setRate = (id, s, v) => setRoles((rs) => rs.map((r) =>
    r.id === id ? { ...r, rate: { ...r.rate, [s]: v } } : r));
  const setQty = (id, v) => setRoles((rs) => rs.map((r) => r.id === id ? { ...r, qty: v } : r));
  const setName = (id, v) => setRoles((rs) => rs.map((r) => r.id === id ? { ...r, name: v } : r));
  const togglePedagog = (id) => setRoles((rs) => rs.map((r) => r.id === id ? { ...r, pedagog: !r.pedagog } : r));
  const toggleActive = (id, sh) => setRoles((rs) => rs.map((r) =>
    r.id === id ? { ...r, active: { ...r.active, [sh]: !r.active[sh] } } : r));
  const removeRole = (id) => setRoles((rs) => rs.filter((r) => r.id !== id));
  const addRole = (group, type) => setRoles((rs) => [...rs, {
    id: "r" + Date.now(),
    name: type === "fixed" ? "Новая роль (фикс)" : "Новая роль",
    type, qty: 1, group, rate: fill(0),
    ...(type === "dayToggle" ? { active: { ...allOn } } : {}),
  }]);

  // --- сохранение / загрузка всех настроек через файл ---
  const saveSettings = () => {
    const data = { capacity, prices, shares, roles, params, v: 1 };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "finmodel-nastroyki.json"; a.click();
    URL.revokeObjectURL(url);
  };
  const loadSettings = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (d.capacity) setCapacity({ ...DEFAULT_CAPACITY, ...d.capacity });
        if (d.prices) setPrices({ ...DEFAULT_PRICES, ...d.prices });
        if (d.shares) setShares({ ...DEFAULT_SHARES, ...d.shares });
        if (d.roles) setRoles(d.roles.map((r) => {
          const def = DEFAULT_ROLES.find((x) => x.id === r.id);
          return def && def.pedagog && r.pedagog === undefined ? { ...r, pedagog: true } : r;
        }));
        if (d.params) setParams({ ...DEFAULT_PARAMS, ...d.params });
      } catch { alert("Не удалось прочитать файл настроек"); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const resetAll = () => {
    if (!confirm("Сбросить все данные к значениям по умолчанию? Текущий черновик будет перезаписан.")) return;
    setCapacity(DEFAULT_CAPACITY); setPrices(DEFAULT_PRICES); setShares(DEFAULT_SHARES);
    setRoles(DEFAULT_ROLES); setParams(DEFAULT_PARAMS);
  };

  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz5wxIuX1AVKZhbXG-TX_uBRMZqr40AZujStPnMT03Z7KIklvGG6RkgLKe8e3WbtGLKcQ/exec";

  const refreshCRM = async () => {
    setSyncing(true);
    try {
      const r = await fetch(APPS_SCRIPT_URL + "?action=fast&fullPrice=" + prices.full);
      const data = await r.json();
      if (data.ok && data.shifts) {
        // объединяем с прежним fact, чтобы сохранить revenueEnrolled/noAbonChildren из медленной загрузки
        setFact((prev) => {
          const merged = {};
          SHIFTS.forEach((sh) => {
            merged[sh] = { ...prev[sh], ...data.shifts[sh] };
          });
          return merged;
        });
        if (data.expensesByShift) setExpensesByShift(data.expensesByShift);
        setLastSync(new Date(data.updatedAt));
      } else {
        alert("CRM вернула ошибку: " + (data.error || "неизвестно"));
      }
    } catch (e) {
      alert("Не удалось получить данные из CRM.\n\nТехническая деталь: " + e);
    }
    setSyncing(false);
  };

  // медленная загрузка: только выручка по абонементам (может занять несколько минут)
  const refreshAbonements = async () => {
    setSyncingAbon(true);
    try {
      const r = await fetch(APPS_SCRIPT_URL + "?action=abon");
      const data = await r.json();
      if (data.ok && data.shifts) {
        setFact((prev) => {
          const merged = {};
          SHIFTS.forEach((sh) => {
            merged[sh] = { ...prev[sh], ...data.shifts[sh] };
          });
          return merged;
        });
        setLastSyncAbon(new Date(data.updatedAt));
      } else {
        alert("Не удалось пересчитать выручку: " + (data.error || "неизвестно"));
      }
    } catch (e) {
      alert("Не удалось пересчитать выручку по абонементам.\n\nЕсли запрос длился >6 мин — " +
        "это превышение лимита Apps Script. Попробуйте позже.\n\nДеталь: " + e);
    }
    setSyncingAbon(false);
  };

  // --- автозагрузка только быстрых данных при открытии дашборда ---
  useEffect(() => { refreshCRM(); }, []);

  const sharesSum = shares.early + shares.normal + shares.full;
  // средняя взвешенная цена места (по долям категорий) — для уже вписанных
  const avgPrice = shares.early * prices.early + shares.normal * prices.normal + shares.full * prices.full;
  // прогноз: вписанные идут по средней цене модели, недобор мест — по цене добора (fillPrice)
  const forecastOf = (sh) => {
    const enrolled = fact[sh].children;
    const shortfall = Math.max(0, (capacity[sh] || 0) - enrolled);
    return enrolled * avgPrice + shortfall * params.fillPrice;
  };

  const factT = SHIFTS.reduce((a, s) => ({
    children: a.children + fact[s].children, cash: a.cash + fact[s].cash,
    erip: a.erip + fact[s].erip, forecast: a.forecast + forecastOf(s),
  }), { children: 0, cash: 0, erip: 0, forecast: 0 });
  const collected = factT.cash + factT.erip;

  return (
    <div style={s.app}>
      <style>{css}</style>
      <header style={s.header}>
        <div>
          <div style={s.kicker}>ФИНАНСОВАЯ МОДЕЛЬ · ЛЕТО 2026</div>
          <h1 style={s.h1}>Лагерь · посменный дашборд</h1>
        </div>
        <div style={s.seasonBox}>
          <span style={s.seasonCap}>
            Чистая прибыль за сезон
            <span onClick={() => setHideProfit(!hideProfit)} style={s.eyeBtn}
              title={hideProfit ? "показать" : "скрыть"}>
              {hideProfit ? "🙈" : "👁"}
            </span>
          </span>
          <span style={{ ...s.seasonNum, color: hideProfit ? "#b5aca2" : (season.netProfit >= 0 ? "#3a7d44" : "#c0392b") }}>
            {hideProfit ? "••• •••" : BYN(season.netProfit)}
          </span>
          <div style={s.saveRow}>
            <button onClick={saveSettings} style={s.saveBtn}>Скачать копию</button>
            <label style={s.loadBtn}>
              Загрузить
              <input type="file" accept="application/json" onChange={loadSettings} style={{ display: "none" }} />
            </label>
            <button onClick={resetAll} style={s.resetBtn} title="сбросить к значениям по умолчанию">Сброс</button>
          </div>
          <div style={s.autosave}>✓ черновик сохраняется автоматически</div>
        </div>
      </header>

      <nav style={s.tabs}>
        {[["plan", "План по сменам"], ["params", "Параметры"], ["payroll", "ЗП"], ["fact", "План vs Факт"]]
          .map(([id, l]) => (
          <button key={id} onClick={() => setTab(id)}
            style={{ ...s.tab, ...(tab === id ? s.tabActive : {}) }}>{l}</button>
        ))}
      </nav>

      {/* ===== ПЛАН ПО СМЕНАМ ===== */}
      {tab === "plan" && (
        <div>
          <section style={s.gaugeCard}>
            <div style={s.gaugeHead}>
              <h2 style={s.h2}>Заполнение смен</h2>
              <div style={s.sub}>вписано из CRM против плановой цели · всего {factT.children} / {SHIFTS.reduce((a, sh) => a + capacity[sh], 0)} детей</div>
            </div>
            <div style={s.gaugeRow}>
              {SHIFTS.map((sh) => (
                <Gauge key={sh} shift={sh} value={fact[sh].children} goal={capacity[sh]} />
              ))}
            </div>
          </section>
          <div style={s.planHint}>
            Прогноз прибыли при <b>полном наборе</b>: выручка и расходы (ЗП, питание, бытовые)
            считаются от планового числа детей в каждой смене — 40 или 60 (задаётся во вкладке «Параметры»).
          </div>
          <div style={s.scroll}>
          <table style={s.ptable}>
            <thead>
              <tr>
                <th style={{ ...s.pth, ...s.pthLeft }}>Показатель</th>
                {perShift.map((p) => (
                  <th key={p.shift} style={s.pth}>
                    Смена {p.shift}<span style={s.pthCap}>{p.cap} детей</span>
                  </th>
                ))}
                <th style={{ ...s.pth, ...s.pthSeason }}>За сезон</th>
              </tr>
            </thead>
            <tbody>
              {[
                ["Выручка", "revenue", true],
                ["Прямые затраты", "directCosts", false],
                ["— ЗП", "payroll", false, true],
                ["— кейтеринг", "catering", false, true],
                ["— бытовые", "household", false, true],
                ["— вложения в клуб", "clubInvest", false, true],
                ["— реклама", "ads", false, true],
                ["Валовая прибыль", "grossProfit", true],
                ["Постоянные расходы", "fixedCosts", false],
                ["EBITDA", "ebitda", true],
                ["Налог УСН", "tax", false],
                ["Чистая прибыль", "netProfit", true, false, true],
              ].map(([label, key, bold, indent, accent]) => (
                <tr key={key} style={bold ? s.ptrBold : {}}>
                  <td style={{ ...s.ptdLeft, paddingLeft: indent ? 28 : 14,
                    ...(accent ? s.ptdAccent : {}) }}>{label}</td>
                  {perShift.map((p) => (
                    <td key={p.shift} style={{ ...s.ptd,
                      ...(key === "ebitda" || key === "netProfit"
                        ? { color: p[key] >= 0 ? "#3a7d44" : "#c0392b", fontWeight: 600 } : {}),
                      ...(accent ? s.ptdAccent : {}) }}>
                      {BYN(p[key])}
                    </td>
                  ))}
                  <td style={{ ...s.ptd, ...s.ptdSeason,
                    ...(accent ? { color: season[key] >= 0 ? "#7be3a0" : "#ffb3a3" } : {}) }}>
                    {BYN(season[key])}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
          </div>

          {/* ===== P&L ПРИ ТЕКУЩЕМ НАБОРЕ (из CRM) ===== */}
          <div style={{ marginTop: 22 }}>
            <div style={s.planHint}>
              Прогноз прибыли при <b>текущем наборе из CRM</b>: выручка = реальные абонементы вписанных
              детей (цена тарифа × дни смены) + дети без летнего абонемента × {BYN(params.pricePerDayNoAbon)}
              × <b>оставшиеся дни смены</b> (если смена идёт — от сегодня до конца; не началась — все дни).
              Расходы на детях (питание) — от фактического числа. Кнопка «↻ Обновить факт» обновляет число
              детей и оплаты быстро (~15 сек); «↻ Выручка по абонементам» пересчитывает выручку из реальных
              тарифов (медленно, до 5 мин — нажимайте редко).
            </div>
            <div style={s.scroll}>
              <table style={s.ptable}>
                <thead>
                  <tr>
                    <th style={{ ...s.pth, ...s.pthLeft }}>Показатель</th>
                    {perShiftActual.map((p) => (
                      <th key={p.shift} style={s.pth}>
                        Смена {p.shift}
                        <div style={s.thSub}>{p.enrolled} детей{p.noAbon > 0 ? " (+" + p.noAbon + " без абон. × " + p.remainDays + "дн)" : ""}</div>
                      </th>
                    ))}
                    <th style={{ ...s.pth, ...s.pthSeason }}>За сезон</th>
                  </tr>
                </thead>
                <tbody>
                  {[
                    ["Выручка", "revenue", true],
                    ["— по абонементам", "revAbon", false, true],
                    ["— без абонемента", "revNoAbon", false, true],
                    ["Прямые затраты", "directCosts", false],
                    ["— ЗП", "payroll", false, true],
                    ["— кейтеринг", "catering", false, true],
                    ["— бытовые", "household", false, true],
                    ["— вложения в клуб", "clubInvest", false, true],
                    ["— реклама", "ads", false, true],
                    ["Валовая прибыль", "grossProfit", true],
                    ["Постоянные расходы", "fixedCosts", false],
                    ["EBITDA", "ebitda", true],
                    ["Налог УСН", "tax", false],
                    ["Чистая прибыль", "netProfit", true, false, true],
                  ].map(([label, key, bold, indent, accent]) => (
                    <tr key={key} className="prow">
                      <td style={{ ...s.ptdLeft, ...(bold ? s.ptdBold : {}), ...(indent ? s.ptdIndent : {}),
                        ...(accent ? s.ptdAccent : {}) }}>{label}</td>
                      {perShiftActual.map((p) => (
                        <td key={p.shift} style={{ ...s.ptd, ...(bold ? s.ptdBold : {}),
                          ...(key === "ebitda" || key === "grossProfit"
                            ? { color: p[key] >= 0 ? "#3a7d44" : "#c0392b", fontWeight: 600 } : {}),
                          ...(accent ? s.ptdAccent : {}) }}>
                          {BYN(p[key])}
                        </td>
                      ))}
                      <td style={{ ...s.ptd, ...s.ptdSeason,
                        ...(accent ? { color: seasonActual[key] >= 0 ? "#7be3a0" : "#ffb3a3" } : {}) }}>
                        {BYN(seasonActual[key])}
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}

      {/* ===== ПАРАМЕТРЫ ===== */}
      {tab === "params" && (
        <div style={s.grid3}>
          <section style={s.card}>
            <h2 style={s.h2}>Наполняемость по сменам</h2>
            <div style={s.sub}>детей в смене · отряд = {KIDS_PER_SQUAD}</div>
            {SHIFTS.map((sh) => (
              <Field key={sh} label={`Смена ${sh}`} value={capacity[sh]}
                onChange={(v) => setCap(sh, v)} suffix={`${squads(capacity[sh])} отр.`} />
            ))}
          </section>

          <section style={s.card}>
            <h2 style={s.h2}>Цены и доли</h2>
            <div style={s.sub}>3 категории внутри смены</div>
            <Field label="Раннее бронирование" value={prices.early} onChange={(v) => setPr("early", v)} suffix="р" />
            <Field label="Обычная" value={prices.normal} onChange={(v) => setPr("normal", v)} suffix="р" />
            <Field label="Полная" value={prices.full} onChange={(v) => setPr("full", v)} suffix="р" />
            <div style={s.divider} />
            <Field label="Доля: раннее" value={shares.early} onChange={(v) => setSh("early", v)} step={0.05} />
            <Field label="Доля: обычная" value={shares.normal} onChange={(v) => setSh("normal", v)} step={0.05} />
            <Field label="Доля: полная" value={shares.full} onChange={(v) => setSh("full", v)} step={0.05} />
            <div style={{ ...s.shareSum, color: Math.abs(sharesSum - 1) < 0.001 ? "#3a7d44" : "#c0392b" }}>
              Сумма: {PCT(sharesSum)} {Math.abs(sharesSum - 1) < 0.001 ? "✓" : "≠ 100%"}
            </div>
            <div style={s.divider} />
            <Field label="Цена добора (прогноз)" value={params.fillPrice} onChange={(v) => setP("fillPrice", v)} suffix="р" />
            <div style={s.subSmall}>по этой цене считаются ещё не собранные места в прогнозе</div>
            <Field label="Цена дня без абонемента" value={params.pricePerDayNoAbon} onChange={(v) => setP("pricePerDayNoAbon", v)} suffix="р" />
            <div style={s.subSmall}>для расчёта выручки вписанных детей, у которых ещё нет летнего абонемента в CRM</div>
          </section>

          <section style={s.card}>
            <h2 style={s.h2}>Расходы и налоги</h2>
            <div style={s.tag}>от оборота / ставки</div>
            <Field label="Кейтеринг, чел/день" value={params.cateringPerDayPerChild} onChange={(v) => setP("cateringPerDayPerChild", v)} suffix="р" />
            <div style={s.subSmall}>× (дети + вожатые на смене + админ) × дни смены</div>
            <Field label="Бытовые, % выручки" value={params.householdPct} onChange={(v) => setP("householdPct", v)} step={0.005} />
            <Field label="Вложения в клуб, % выручки" value={params.clubInvestPct} onChange={(v) => setP("clubInvestPct", v)} step={0.005} />
            <Field label="Реклама/смена" value={params.internetAdsPerShift} onChange={(v) => setP("internetAdsPerShift", v)} suffix="р" />
            <Field label="УСН, % выручки" value={params.usnPct} onChange={(v) => setP("usnPct", v)} step={0.005} />
            <div style={s.divider} />
            <div style={s.tag}>постоянные, фикс/смена</div>
            <Field label="Аренда" value={params.rent} onChange={(v) => setP("rent", v)} suffix="р" />
            <Field label="Коммуналка" value={params.utilities} onChange={(v) => setP("utilities", v)} suffix="р" />
            <Field label="Кредит" value={params.credit} onChange={(v) => setP("credit", v)} suffix="р" />
            <Field label="Интернет" value={params.internet} onChange={(v) => setP("internet", v)} suffix="р" />
            <Field label="Связь" value={params.mobile} onChange={(v) => setP("mobile", v)} suffix="р" />
            <Field label="Сервисы" value={params.services} onChange={(v) => setP("services", v)} suffix="р" />
            <Field label="Обяз. выплаты" value={params.mandatoryStaff} onChange={(v) => setP("mandatoryStaff", v)} suffix="р" />
          </section>
        </div>
      )}

      {/* ===== ЗП ===== */}
      {tab === "payroll" && (
        <div style={s.scroll}>
          <table style={s.ptable}>
            <thead>
              <tr>
                <th style={{ ...s.pth, ...s.pthLeft }}>Роль</th>
                <th style={s.pth}>Кол-во</th>
                {SHIFTS.map((sh) => (
                  <th key={sh} style={s.pth}>Смена {sh}<span style={s.pthCap}>{days[sh]} дн.</span></th>
                ))}
              </tr>
            </thead>
            <tbody>
              {["team", "couns", "budget"].map((g) => (
                <React.Fragment key={g}>
                  <tr><td colSpan={2 + SHIFTS.length} style={s.groupRow}>
                    {g === "team" ? "Команда смены"
                      : g === "couns" ? "Вожатые (галочка = работает на смене)"
                      : "Бюджетные / фикс за смену"}
                  </td></tr>
                  {roles.filter((r) => r.group === g).map((r) => (
                    <tr key={r.id} className="prow">
                      <td style={s.ptdLeft}>
                        <span style={r.type === "fixed" ? s.dotFix : s.dotDay} />
                        <input value={r.name} onChange={(e) => setName(r.id, e.target.value)}
                          style={s.nameInput} />
                        {g === "team" && r.id !== "admin" && (
                          <label style={s.pedTag} title="относить ЗП к статье «ЗП за МК»">
                            <input type="checkbox" checked={!!r.pedagog}
                              onChange={() => togglePedagog(r.id)} style={s.pedChk} />
                            педагог
                          </label>
                        )}
                        <button onClick={() => removeRole(r.id)} style={s.delBtn} title="удалить роль">×</button>
                      </td>
                      <td style={s.qtyTd}>
                        {r.type === "dayToggle" ? (
                          <span style={s.autoTag}>1</span>
                        ) : (
                          <input type="number" value={r.qty} min={0}
                            onChange={(e) => setQty(r.id, parseInt(e.target.value) || 0)}
                            style={s.qtyInput} />
                        )}
                      </td>
                      {SHIFTS.map((sh) => {
                        const ed = editCell && editCell.id === r.id && editCell.sh === sh;
                        const isToggle = r.type === "dayToggle";
                        const on = isToggle ? r.active[sh] : true;
                        return (
                          <td key={sh} style={{ ...s.cellTd, ...(isToggle && !on ? s.cellOff : {}) }}>
                            {isToggle ? (
                              <div style={s.toggleCell}>
                                <input type="checkbox" checked={on}
                                  onChange={() => toggleActive(r.id, sh)} style={s.chk} />
                                {ed ? (
                                  <input autoFocus type="number" value={r.rate[sh]}
                                    onChange={(e) => setRate(r.id, sh, parseFloat(e.target.value) || 0)}
                                    onBlur={() => setEditCell(null)}
                                    onKeyDown={(e) => e.key === "Enter" && setEditCell(null)}
                                    style={s.cellInput} />
                                ) : (
                                  <div style={s.cellView} onClick={() => on && setEditCell({ id: r.id, sh })}>
                                    <span style={s.cRate}>{on ? r.rate[sh] + "/дн" : "—"}</span>
                                    <span style={s.cCost}>{on ? BYN(roleCost(r, sh, days)).replace(" р", "") : ""}</span>
                                  </div>
                                )}
                              </div>
                            ) : (
                              <div onClick={() => setEditCell({ id: r.id, sh })}>
                                {ed ? (
                                  <input autoFocus type="number" value={r.rate[sh]}
                                    onChange={(e) => setRate(r.id, sh, parseFloat(e.target.value) || 0)}
                                    onBlur={() => setEditCell(null)}
                                    onKeyDown={(e) => e.key === "Enter" && setEditCell(null)}
                                    style={s.cellInput} />
                                ) : (
                                  <div style={s.cellView}>
                                    <span style={s.cRate}>{r.rate[sh]}{r.type === "day" ? "/дн" : ""}</span>
                                    <span style={s.cCost}>{BYN(roleCost(r, sh, days)).replace(" р", "")}</span>
                                  </div>
                                )}
                              </div>
                            )}
                          </td>
                        );
                      })}
                    </tr>
                  ))}
                  <tr>
                    <td colSpan={2 + SHIFTS.length} style={s.addRow}>
                      <button onClick={() => addRole(g, g === "couns" ? "dayToggle" : "day")}
                        style={s.addBtn}>+ роль (ставка/день)</button>
                      <button onClick={() => addRole(g, "fixed")}
                        style={s.addBtn}>+ роль (фикс/смена)</button>
                    </td>
                  </tr>
                </React.Fragment>
              ))}
              <tr>
                <td style={s.totLabel} colSpan={2}>ФОТ смены →</td>
                {perShift.map((p) => (
                  <td key={p.shift} style={s.totCell}>{BYN(p.payroll).replace(" р", "")}</td>
                ))}
              </tr>
            </tbody>
          </table>
          <div style={s.note}>
            Имя роли можно изменить прямо в строке, × удаляет роль, кнопки «+ роль» внизу группы
            добавляют новую. Вожатые: галочка отмечает работу на смене (40 детей — 4, 60 — 6).
            Ставку задавайте свою в каждой смене — для случая «педагог дороже студента».

            <FactCard num={BYN(factT.erip)} cap="через ЕРИП" />

          {(() => {
            const a = perShiftActual.find((x) => x.shift === expShift) || perShiftActual[0];

            const haveFact = factExp != null;
            // ФАКТ: реальный доход из CRM − реальные расходы из CRM (налог уже внутри статьи 15)
            const factRevenue = a.revenue;
            const factProfit = haveFact ? factRevenue - factExp : null;
            // ПЛАН: прибыль из модели при текущем наборе (доход реальный, расходы плановые)
            const planProfit = a.netProfit;
            const deviation = haveFact ? factProfit - planProfit : null;

            return (
              <div style={{ marginBottom: 22 }}>
                <h2 style={s.h2}>Результат смены {expShift}</h2>

                </div>

                    <div style={s.resRow}><span>Доход</span><span>{BYN(factRevenue)}</span></div>
                    <div style={s.resRow}><span>Расходы</span><span>{haveFact ? "−" + BYN(factExp) : "—"}</span></div>
                    <div style={{ ...s.resTotal, color: haveFact ? col(factProfit) : "#9a9088" }}>
                      <span>Прибыль факт</span>
                      <span>{haveFact ? BYN(factProfit) : "нет данных"}</span>
                    </div>
                  </div>
                  <div style={s.resCard}>
                    <div style={s.resCap}>ПЛАН (модель)</div>
                    <div style={s.resRow}><span>Доход</span><span>{BYN(a.revenue)}</span></div>
                    <div style={s.resRow}><span>Расходы</span><span>−{BYN(a.revenue - planProfit)}</span></div>
                    <div style={{ ...s.resTotal, color: col(planProfit) }}>
                      <span>Прибыль план</span>
                      <span>{BYN(planProfit)}</span>
                    </div>
                  </div>
                  <div style={{ ...s.resCard, ...s.resCardAccent }}>
                    <div style={s.resCap}>ОТКЛОНЕНИЕ факт − план</div>
                    <div style={{ ...s.resBig, color: haveFact ? col(deviation) : "#9a9088" }}>
                      {haveFact ? (deviation > 0 ? "+" : "") + BYN(deviation) : "—"}
                    </div>
                    <div style={s.resHint}>
                      {haveFact

                        : "появится, когда в CRM будут расходы смены"}
                    </div>
                  </div>
                </div>

                  ПЛАН — прибыль из модели при текущем числе детей (доход реальный, расходы расчётные).
                  Отклонение «+» зелёным — заработали больше плана, «−» красным — меньше.
                </div>

                      <td style={s.ptd}>{BYN(f.erip)}</td>
                      <td style={s.ptd}>{BYN(got)}</td>
                      <td style={s.ptd}>{BYN(forecast)}</td>

                  <td style={s.totCell}>{BYN(factT.erip)}</td>
                  <td style={s.totCell}>{BYN(collected)}</td>
                  <td style={s.totCell}>{BYN(factT.forecast)}</td>

            То есть уже зашедшие идут по обычной цене, а ещё не собранных считаем дороже.
            Цены, доли, набор и цену добора меняете во вкладке «Параметры». Факт — из AlfaCRM по кнопке.
          </div>

          {/* ===== РАСХОДЫ ПО СМЕНЕ: ПЛАН / ФАКТ ===== */}
          <div style={{ marginTop: 22 }}>
            <h2 style={s.h2}>Расходы по смене: план vs факт</h2>
            <div style={s.sub}>
              {expensesByShift
                ? "факт из AlfaCRM по датам внесения этой смены"
                : "факт появится, когда в CRM будут расходы (пока сезон не начался)"}
            </div>
            <div style={s.scroll}>
              <table style={s.ptable}>
                <thead><tr>
                  {["Статья", "План смены", "Факт из CRM", "Разница"].map((h, i) => (
                    <th key={h} style={{ ...s.pth, ...(i === 0 ? s.pthLeft : {}) }}>{h}</th>
                  ))}
                </tr></thead>
                <tbody>
                  {(() => {

                    const factShift = expensesByShift ? (expensesByShift[expShift] || {}) : null;
                    let planTot = 0, factTot = 0;
                    const rows = EXPENSE_MAP.map((row) => {
                      const planVal = row.plan(p, params);
                      const factVal = factShift
                        ? (row.factItems || [row.itemId]).reduce((s, id) => s + (factShift[id] || 0), 0)
                        : null;
                      if (planVal != null) planTot += planVal;
                      if (factVal != null) factTot += factVal;
                      const diff = (planVal != null && factVal != null) ? planVal - factVal : null;
                      return (
                        <tr key={row.itemId} className="prow">
                          <td style={s.ptdLeft}>{row.name}</td>
                          <td style={s.ptd}>{planVal != null ? BYN(planVal) : "—"}</td>
                          <td style={s.ptd}>{factVal != null ? BYN(factVal) : "—"}</td>
                          <td style={{ ...s.ptd, color: diff == null ? "#9a9088" : diff < 0 ? "#c0392b" : "#3a7d44" }}>
                            {diff != null ? (diff > 0 ? "+" : "") + BYN(diff) : "—"}
                          </td>
                        </tr>
                      );
                    });
                    rows.push(
                      <tr key="tot">
                        <td style={s.totLabel}>Итого расходов</td>
                        <td style={s.totCell}>{BYN(planTot)}</td>
                        <td style={s.totCell}>{factShift ? BYN(factTot) : "—"}</td>
                        <td style={{ ...s.totCell, color: !factShift ? undefined : (planTot - factTot) < 0 ? "#ffb3a3" : "#7be3a0" }}>
                          {factShift ? (planTot - factTot > 0 ? "+" : "") + BYN(planTot - factTot) : "—"}
                        </td>
                      </tr>
                    );
                    return rows;
                  })()}
                </tbody>
              </table>
            </div>
            <div style={s.note}>
              План — расходы этой смены из модели. Факт — расходы из AlfaCRM, внесённые в даты смены
              (смена {expShift}: {SHIFT_DATE_LABEL[expShift]}). Разница = план − факт: «+» зелёным — экономия,
              «−» красным — перерасход. Постоянные расходы (аренда, кредит) попадают в ту смену, в чьи даты прошёл платёж.
            </div>
          </div>
        </section>
      )}

      <footer style={s.footer}>
        Прототип · «проверь» = подтвердить значение · сезон складывается из 6 разных смен
      </footer>
    </div>
  );
}

// --- спидометр заполнения смены (SVG, полукруг) ---
const Gauge = ({ shift, value, goal }) => {
  const pct = goal > 0 ? Math.min(value / goal, 1) : 0;
  const pctText = goal > 0 ? Math.round((value / goal) * 100) : 0;
  // полукруг: углы от 180° (слева) до 0° (справа)
  const cx = 80, cy = 80, r = 62;
  const polar = (frac) => {
    const a = Math.PI - frac * Math.PI; // 180°→0°
    return [cx + r * Math.cos(a), cy - r * Math.sin(a)];
  };
  const arcPath = (from, to) => {
    const [x1, y1] = polar(from), [x2, y2] = polar(to);
    const large = to - from > 0.5 ? 1 : 0;
    return `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2}`;
  };
  // цвет стрелки по заполнению
  const col = pct >= 0.85 ? "#3a7d44" : pct >= 0.6 ? "#d99b3f" : "#c0544a";
  const [nx, ny] = polar(pct);
  return (
    <div style={s.gaugeBox}>
      <svg viewBox="0 0 160 104" style={{ width: "100%", height: "auto" }}>
        {/* зоны */}
        <path d={arcPath(0, 0.6)} fill="none" stroke="#ecc9c4" strokeWidth="11" strokeLinecap="round" />
        <path d={arcPath(0.6, 0.85)} fill="none" stroke="#f0dcae" strokeWidth="11" />
        <path d={arcPath(0.85, 1)} fill="none" stroke="#bfe0c4" strokeWidth="11" strokeLinecap="round" />
        {/* стрелка */}
        <line x1={cx} y1={cy} x2={nx} y2={ny} stroke={col} strokeWidth="3.5" strokeLinecap="round" />
        <circle cx={cx} cy={cy} r="6" fill={col} />
        {/* подписи краёв */}
        <text x="14" y="98" style={s.gaugeEdge}>0</text>
        <text x="146" y="98" style={s.gaugeEdge} textAnchor="end">{goal}</text>
      </svg>
      <div style={s.gaugeNum}>{value}<span style={s.gaugeGoal}> / {goal}</span></div>
      <div style={{ ...s.gaugePct, color: col }}>{pctText}%</div>
      <div style={s.gaugeLabel}>Смена {shift}</div>
    </div>
  );
};
